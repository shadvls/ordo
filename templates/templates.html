<script id="tpl-app" type="text/x-handlebars-template">
  <div id="progress-region"></div>
  <div id="list-region"></div>
  <div id="detail-region"></div>
</script>

<script id="tpl-progress" type="text/x-handlebars-template">
  <div class="progress-container">
    <div class="progress">
      <div class="progress-bar progress-bar-success" style="width: {{percent}}%"></div>
    </div>
    <div class="stats-text">
      <strong>{{done}}</strong> of <strong>{{total}}</strong> tasks done
      (<strong>{{pending}}</strong> pending)
    </div>
  </div>
</script>

<script id="tpl-empty" type="text/x-handlebars-template">
  <div class="empty-state">
    <i class="fa fa-inbox"></i>
    <p>No tasks yet. Create one above!</p>
  </div>
</script>

<script id="tpl-task-item" type="text/x-handlebars-template">
  <div class="task-item priority-{{priorityClass}} {{#if done}}done{{/if}}" data-id="{{id}}">
    <div class="checkbox">
      <label>
        <input type="checkbox" class="task-toggle" {{#if done}}checked{{/if}}>
        <span class="task-title">{{title}}</span>
        {{#if priorityLabel}}
          <span class="label label-{{priorityClass}} label-priority">{{priorityLabel}}</span>
        {{/if}}
      </label>
    </div>
    <div class="task-actions">
      <a href="#task/{{id}}" class="btn btn-xs btn-default" title="View details">
        <i class="fa fa-eye"></i>
      </a>
      <button class="btn btn-xs btn-danger task-delete" title="Delete">
        <i class="fa fa-trash-o"></i>
      </button>
    </div>
  </div>
</script>

<script id="tpl-task-list" type="text/x-handlebars-template">
  <div class="row">
    <div class="col-md-8">
      <div class="category-group">
        <div class="category-header">
          <h4><i class="fa fa-clock-o"></i> Pending</h4>
          <span class="badge">{{pendingCount}}</span>
        </div>
        <div id="pending-list"></div>
      </div>
      <div class="category-group">
        <div class="category-header">
          <h4><i class="fa fa-check"></i> Completed</h4>
          <span class="badge">{{doneCount}}</span>
        </div>
        <div id="done-list"></div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="panel panel-default">
        <div class="panel-heading">
          <h3 class="panel-title"><i class="fa fa-plus-circle"></i> Quick Add</h3>
        </div>
        <div class="panel-body">
          <form id="form-quick-add">
            <div class="form-group">
              <input type="text" class="form-control" id="quick-title" placeholder="Task title..." required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">
              Add Task
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</script>

<script id="tpl-task-detail" type="text/x-handlebars-template">
  <div class="panel panel-default">
    <div class="panel-heading">
      <h3 class="panel-title">
        <i class="fa fa-check-square-o"></i> {{title}}
      </h3>
    </div>
    <div class="panel-body">
      <form id="form-task-detail">
        <div class="form-group">
          <label>Title</label>
          <input type="text" class="form-control" name="title" value="{{title}}" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea class="form-control" name="description" rows="4">{{description}}</textarea>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select class="form-control" name="category">
            <option value="general" {{#ifEq category "general"}}selected{{/ifEq}}>General</option>
            <option value="work" {{#ifEq category "work"}}selected{{/ifEq}}>Work</option>
            <option value="personal" {{#ifEq category "personal"}}selected{{/ifEq}}>Personal</option>
            <option value="learning" {{#ifEq category "learning"}}selected{{/ifEq}}>Learning</option>
          </select>
        </div>
        <div class="form-group">
          <label>Priority</label>
          <select class="form-control" name="priority">
            <option value="0" {{#ifEq priority 0}}selected{{/ifEq}}>Normal</option>
            <option value="1" {{#ifEq priority 1}}selected{{/ifEq}}>High</option>
            <option value="2" {{#ifEq priority 2}}selected{{/ifEq}}>Urgent</option>
          </select>
        </div>
        <div class="checkbox">
          <label>
            <input type="checkbox" name="status" value="done" {{#if done}}checked{{/if}}>
            Mark as completed
          </label>
        </div>
        <hr>
        <button type="submit" class="btn btn-success">
          <i class="fa fa-save"></i> Save
        </button>
        <a href="#/" class="btn btn-default">Back</a>
        <button class="btn btn-danger pull-right task-delete">
          <i class="fa fa-trash-o"></i> Delete
        </button>
      </form>
    </div>
  </div>
</script>
