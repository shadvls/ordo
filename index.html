<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ordo — Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="icon" href="/static/favicon.ico">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <Header class="app-header">
    <div class="container">
      <a class="app-brand" href="#/"><i class="fa fa-check-square-o"></i> Ordo</a>
      <div class="header-actions">
        <div class="search-box">
          <i class="fa fa-search"></i>
          <input type="text" id="search-input" placeholder="Search tasks..." />
          <button class="search-clear" id="search-clear"><i class="fa fa-times"></i></button>
        </div>
        <span class="keyboard-hint"><kbd>/</kbd></span>
      </div>
    </div>
  </Header>

  <div id="app"></div>

  <!-- Handlebars Templates -->
  <script id="tpl-app" type="text/x-handlebars-template">
    <div class="container">
      <div id="notify-region"></div>
      <div id="progress-region"></div>
      <div id="add-region"></div>
      <div id="list-region"></div>
      <div id="detail-region"></div>
    </div>
  </script>

  <script id="tpl-notify" type="text/x-handlebars-template">
    <div class="alert alert-{{type}}" role="alert">
      <i class="fa {{icon}}"></i> {{message}}
      <button type="button" class="close" data-dismiss="alert">&times;</button>
    </div>
  </script>

  <script id="tpl-progress" type="text/x-handlebars-template">
    <div class="progress-card">
      <div class="progress-bar-wrapper">
        <div class="progress-bar-fill" style="width: {{percent}}%"></div>
      </div>
      <div class="progress-stats">
        <strong>{{done}}</strong> of <strong>{{total}}</strong> tasks done
        (<strong>{{pending}}</strong> pending)
      </div>
    </div>
  </script>

  <script id="tpl-empty" type="text/x-handlebars-template">
    <div class="empty-state">
      <i class="fa fa-inbox"></i>
      <p>No tasks yet. Create one above!</p>
    </div>
  </script>

  <script id="tpl-empty-filtered" type="text/x-handlebars-template">
    <div class="empty-state">
      <i class="fa fa-search"></i>
      <p>No tasks match <strong>"{{query}}"</strong></p>
    </div>
  </script>

  <script id="tpl-loading" type="text/x-handlebars-template">
    <div class="loading-overlay">
      <div class="loading-spinner"></div>
    </div>
  </script>

  <script id="tpl-quick-add" type="text/x-handlebars-template">
    <div class="panel-add">
      <div class="panel-add-title">
        <i class="fa fa-plus-circle"></i> Add Task
      </div>
      <form id="form-quick-add" class="quick-add-form">
        <input type="text" id="quick-title" placeholder="What needs to be done?" required autofocus>
        <button type="submit" class="btn-primary">Add</button>
      </form>
    </div>
  </script>

  <script id="tpl-task-item" type="text/x-handlebars-template">
    <div class="task-item priority-{{priorityClass}} {{#if done}}completed{{/if}}" data-id="{{id}}">
      <div class="task-check">
        <input type="checkbox" class="task-toggle" {{#if done}}checked{{/if}}>
      </div>
      <div class="task-body">
        <div class="task-title">{{title}}</div>
        <div class="task-meta">
          {{#if priorityLabel}}
            <span class="priority-badge {{priorityClass}}">{{priorityLabel}}</span>
          {{/if}}
          {{#if category}}
            <span class="category-tag"><i class="fa fa-tag"></i> {{category}}</span>
          {{/if}}
        </div>
      </div>
      <div class="task-actions">
        <button class="btn-icon task-view" title="View details">
          <i class="fa fa-eye"></i>
        </button>
        <button class="btn-icon danger task-delete" title="Delete">
          <i class="fa fa-trash-o"></i>
        </button>
      </div>
    </div>
  </script>

  <script id="tpl-task-list" type="text/x-handlebars-template">
    <div class="task-section">
      <div class="task-section-header">
        <i class="fa fa-clock-o"></i>
        <h3>Pending</h3>
        <span class="task-count">{{pendingCount}}</span>
      </div>
      <div id="pending-list"></div>
    </div>
    <div class="task-section">
      <div class="task-section-header">
        <i class="fa fa-check"></i>
        <h3>Completed</h3>
        <span class="task-count">{{doneCount}}</span>
      </div>
      <div id="done-list"></div>
    </div>
  </script>

  <script id="tpl-task-detail" type="text/x-handlebars-template">
    <div class="panel-detail">
      <div class="panel-detail-header">
        <i class="fa fa-check-square-o"></i>
        <h3>{{title}}</h3>
      </div>
      <form id="form-task-detail">
        <div class="form-group">
          <label>Title</label>
          <input type="text" name="title" value="{{title}}" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea name="description" rows="4">{{description}}</textarea>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select name="category">
            <option value="general" {{#ifEq category "general"}}selected{{/ifEq}}>General</option>
            <option value="work" {{#ifEq category "work"}}selected{{/ifEq}}>Work</option>
            <option value="personal" {{#ifEq category "personal"}}selected{{/ifEq}}>Personal</option>
            <option value="learning" {{#ifEq category "learning"}}selected{{/ifEq}}>Learning</option>
          </select>
        </div>
        <div class="form-group">
          <label>Priority</label>
          <select name="priority">
            <option value="0" {{#ifEq priority 0}}selected{{/ifEq}}>Normal</option>
            <option value="1" {{#ifEq priority 1}}selected{{/ifEq}}>High</option>
            <option value="2" {{#ifEq priority 2}}selected{{/ifEq}}>Urgent</option>
          </select>
        </div>
        <div class="checkbox-wrapper">
          <input type="checkbox" name="status" value="done" id="detail-done" {{#if done}}checked{{/if}}>
          <label for="detail-done">Mark as completed</label>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-success"><i class="fa fa-save"></i> Save</button>
          <a href="#/" class="btn-ghost"><i class="fa fa-arrow-left"></i> Back</a>
          <button class="btn-danger task-delete"><i class="fa fa-trash-o"></i> Delete</button>
        </div>
      </form>
    </div>
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/1.10.2/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/underscore.js/1.5.2/underscore-min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/backbone.js/1.0.0/backbone-min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/1.0.0/handlebars.min.js"></script>

  <script>var App={Models:{},Collections:{},Views:{},Router:{}};window.App=App;</script>

  <script src="/static/js/app/models/task.js"></script>
  <script src="/static/js/app/views/task-item.js"></script>
  <script src="/static/js/app/views/task-progress.js"></script>
  <script src="/static/js/app/views/notify.js"></script>
  <script src="/static/js/app/views/task-list.js"></script>
  <script src="/static/js/app/views/task-detail.js"></script>
  <script src="/static/js/app/router.js"></script>
  <script src="/static/js/app/main.js"></script>
</body>
</html>
