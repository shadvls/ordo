<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ordo — Task Manager</title>
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/3.3.7/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="icon" href="/static/favicon.ico">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <nav class="navbar navbar-default navbar-fixed-top" role="navigation">
    <div class="container">
      <div class="navbar-header">
        <a class="navbar-brand" href="#"><i class="fa fa-check-square-o"></i> Ordo</a>
      </div>
      <p class="navbar-text navbar-right hidden-xs">Stay organized. Get things done.</p>
    </div>
  </nav>

  <div id="app" class="container"></div>

  <!-- Handlebars Templates -->
  <script id="tpl-app" type="text/x-handlebars-template">
    <div id="progress-region"></div>
    <div id="list-region"></div>
    <div id="detail-region"></div>
  </script>

  <script id="tpl-progress" type="text/x-handlebars-template">
    <div class="progress-container">
      <div class="progress">
        <div class="progress-bar progress-bar-success" style="width: {{percent}}%"></div>
      </div>
      <div class="stats-text">
        <strong>{{done}}</strong> of <strong>{{total}}</strong> tasks done
        (<strong>{{pending}}</strong> pending)
      </div>
    </div>
  </script>

  <script id="tpl-empty" type="text/x-handlebars-template">
    <div class="empty-state">
      <i class="fa fa-inbox"></i>
      <p>No tasks yet. Create one above!</p>
    </div>
  </script>

  <script id="tpl-task-item" type="text/x-handlebars-template">
    <div class="task-item priority-{{priorityClass}} {{#if done}}done{{/if}}" data-id="{{id}}">
      <div class="checkbox">
        <label>
          <input type="checkbox" class="task-toggle" {{#if done}}checked{{/if}}>
          <span class="task-title">{{title}}</span>
          {{#if priorityLabel}}
            <span class="label label-{{priorityClass}} label-priority">{{priorityLabel}}</span>
          {{/if}}
        </label>
      </div>
      <div class="task-actions">
        <a href="#task/{{id}}" class="btn btn-xs btn-default" title="View details">
          <i class="fa fa-eye"></i>
        </a>
        <button class="btn btn-xs btn-danger task-delete" title="Delete">
          <i class="fa fa-trash-o"></i>
        </button>
      </div>
    </div>
  </script>

  <script id="tpl-task-list" type="text/x-handlebars-template">
    <div class="row">
      <div class="col-md-8">
        <div class="category-group">
          <div class="category-header">
            <h4><i class="fa fa-clock-o"></i> Pending</h4>
            <span class="badge">{{pendingCount}}</span>
          </div>
          <div id="pending-list"></div>
        </div>
        <div class="category-group">
          <div class="category-header">
            <h4><i class="fa fa-check"></i> Completed</h4>
            <span class="badge">{{doneCount}}</span>
          </div>
          <div id="done-list"></div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="panel panel-default">
          <div class="panel-heading">
            <h3 class="panel-title"><i class="fa fa-plus-circle"></i> Quick Add</h3>
          </div>
          <div class="panel-body">
            <form id="form-quick-add">
              <div class="form-group">
                <input type="text" class="form-control" id="quick-title" placeholder="Task title..." required>
              </div>
              <button type="submit" class="btn btn-primary btn-block">
                Add Task
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </script>

  <script id="tpl-task-detail" type="text/x-handlebars-template">
    <div class="panel panel-default">
      <div class="panel-heading">
        <h3 class="panel-title">
          <i class="fa fa-check-square-o"></i> {{title}}
        </h3>
      </div>
      <div class="panel-body">
        <form id="form-task-detail">
          <div class="form-group">
            <label>Title</label>
            <input type="text" class="form-control" name="title" value="{{title}}" required>
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea class="form-control" name="description" rows="4">{{description}}</textarea>
          </div>
          <div class="form-group">
            <label>Category</label>
            <select class="form-control" name="category">
              <option value="general" {{#ifEq category "general"}}selected{{/ifEq}}>General</option>
              <option value="work" {{#ifEq category "work"}}selected{{/ifEq}}>Work</option>
              <option value="personal" {{#ifEq category "personal"}}selected{{/ifEq}}>Personal</option>
              <option value="learning" {{#ifEq category "learning"}}selected{{/ifEq}}>Learning</option>
            </select>
          </div>
          <div class="form-group">
            <label>Priority</label>
            <select class="form-control" name="priority">
              <option value="0" {{#ifEq priority 0}}selected{{/ifEq}}>Normal</option>
              <option value="1" {{#ifEq priority 1}}selected{{/ifEq}}>High</option>
              <option value="2" {{#ifEq priority 2}}selected{{/ifEq}}>Urgent</option>
            </select>
          </div>
          <div class="checkbox">
            <label>
              <input type="checkbox" name="status" value="done" {{#if done}}checked{{/if}}>
              Mark as completed
            </label>
          </div>
          <hr>
          <button type="submit" class="btn btn-success">
            <i class="fa fa-save"></i> Save
          </button>
          <a href="#/" class="btn btn-default">Back</a>
          <button class="btn btn-danger pull-right task-delete">
            <i class="fa fa-trash-o"></i> Delete
          </button>
        </form>
      </div>
    </div>
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/1.10.2/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/underscore.js/1.5.2/underscore-min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/backbone.js/1.0.0/backbone-min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/1.0.0/handlebars.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/3.3.7/js/bootstrap.min.js"></script>

  <script src="/static/js/app/models/task.js"></script>
  <script src="/static/js/app/views/task-item.js"></script>
  <script src="/static/js/app/views/task-progress.js"></script>
  <script src="/static/js/app/views/notify.js"></script>
  <script src="/static/js/app/views/task-list.js"></script>
  <script src="/static/js/app/views/task-detail.js"></script>
  <script src="/static/js/app/router.js"></script>
  <script src="/static/js/app/main.js"></script>
</body>
</html>
