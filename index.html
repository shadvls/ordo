<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ordo — Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" href="/static/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            primary: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81' },
          },
          animation: {
            'fade-in': 'fadeIn 0.3s ease-out',
            'slide-up': 'slideUp 0.3s ease-out',
            'slide-down': 'slideDown 0.3s ease-out',
            'scale-in': 'scaleIn 0.2s ease-out',
            'bounce-in': 'bounceIn 0.4s ease-out',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(12px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            slideDown: { '0%': { opacity: '0', transform: 'translateY(-12px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            scaleIn: { '0%': { opacity: '0', transform: 'scale(0.95)' }, '100%': { opacity: '1', transform: 'scale(1)' } },
            bounceIn: { '0%': { opacity: '0', transform: 'scale(0.3)' }, '50%': { transform: 'scale(1.05)' }, '70%': { transform: 'scale(0.9)' }, '100%': { opacity: '1', transform: 'scale(1)' } },
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-sans antialiased min-h-screen transition-colors duration-300">

  <!-- Header -->
  <header class="sticky top-0 z-50 backdrop-blur-xl bg-white/80 dark:bg-slate-900/80 border-b border-slate-200/60 dark:border-slate-700/60">
    <div class="max-w-4xl mx-auto px-4 h-14 flex items-center justify-between gap-4">
      <a href="#/" class="flex items-center gap-2.5 text-lg font-bold text-slate-800 dark:text-white hover:text-primary-600 dark:hover:text-primary-400 transition-colors no-underline">
        <i class="fa-solid fa-check-circle text-primary-500 text-xl"></i>
        Ordo
      </a>
      <div class="flex items-center gap-3">
        <div class="relative">
          <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs pointer-events-none"></i>
          <input type="text" id="search-input" placeholder="Search..." class="w-36 sm:w-48 lg:w-56 h-9 pl-8 pr-8 text-sm bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-full outline-none focus:ring-2 focus:ring-primary-500/30 focus:border-primary-500 dark:focus:border-primary-400 focus:bg-white dark:focus:bg-slate-800 placeholder:text-slate-400 dark:placeholder:text-slate-500 transition-all duration-200" />
          <button id="search-clear" class="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 hidden text-xs"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <button id="theme-toggle" class="w-9 h-9 flex items-center justify-center rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-slate-700 dark:hover:text-slate-200 transition-colors" title="Toggle theme">
          <i class="fa-solid fa-moon dark:hidden"></i>
          <i class="fa-solid fa-sun hidden dark:inline"></i>
        </button>
        <span class="hidden sm:flex items-center gap-1 text-xs text-slate-400"><kbd class="px-1.5 py-0.5 rounded border border-slate-300 dark:border-slate-600 bg-slate-100 dark:bg-slate-800 font-sans text-[11px]">/</kbd></span>
      </div>
    </div>
  </header>

  <!-- App Root -->
  <div id="app"></div>

  <!-- Handlebars Templates -->
  <script id="tpl-app" type="text/x-handlebars-template">
    <div class="max-w-4xl mx-auto px-4 py-6 space-y-5">
      <div id="notify-region"></div>
      <div id="progress-region"></div>
      <div id="add-region"></div>
      <div id="list-region"></div>
      <div id="detail-region"></div>
    </div>
  </script>

  <script id="tpl-notify" type="text/x-handlebars-template">
    <div class="flex items-center gap-2.5 px-4 py-3 rounded-xl text-sm font-medium shadow-lg backdrop-blur-sm {{#ifEq type "success"}}bg-emerald-50 dark:bg-emerald-900/40 text-emerald-800 dark:text-emerald-200 border border-emerald-200 dark:border-emerald-700{{else}}bg-red-50 dark:bg-red-900/40 text-red-800 dark:text-red-200 border border-red-200 dark:border-red-700{{/ifEq}}" role="alert">
      <i class="fa-solid {{icon}} text-sm"></i>
      <span class="flex-1">{{message}}</span>
      <button type="button" class="notify-close opacity-60 hover:opacity-100 transition-opacity text-sm leading-none"><i class="fa-solid fa-xmark"></i></button>
    </div>
  </script>

  <script id="tpl-progress" type="text/x-handlebars-template">
    <div class="bg-white dark:bg-slate-800/80 rounded-2xl border border-slate-200/60 dark:border-slate-700/60 p-5 shadow-sm">
      <div class="flex items-center justify-between mb-3">
        <span class="text-sm font-medium text-slate-600 dark:text-slate-400">Progress</span>
        <span class="text-xs font-semibold text-primary-600 dark:text-primary-400">{{done}}/{{total}} done</span>
      </div>
      <div class="h-2.5 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden">
        <div class="progress-fill h-full rounded-full bg-gradient-to-r from-primary-500 to-primary-400 dark:from-primary-400 dark:to-primary-500 transition-all duration-700 ease-out" style="width: {{percent}}%"></div>
      </div>
      <div class="mt-1.5 text-xs text-slate-500 dark:text-slate-500 flex items-center gap-3">
        <span><span class="font-semibold text-slate-700 dark:text-slate-300">{{pending}}</span> pending</span>
        <span><span class="font-semibold text-slate-700 dark:text-slate-300">{{done}}</span> completed</span>
      </div>
    </div>
  </script>

  <script id="tpl-empty" type="text/x-handlebars-template">
    <div class="flex flex-col items-center justify-center py-16 text-slate-400 dark:text-slate-500">
      <i class="fa-solid fa-inbox text-5xl mb-4 text-slate-300 dark:text-slate-600"></i>
      <p class="text-sm font-medium">No tasks yet. Create one above!</p>
    </div>
  </script>

  <script id="tpl-empty-filtered" type="text/x-handlebars-template">
    <div class="flex flex-col items-center justify-center py-16 text-slate-400 dark:text-slate-500">
      <i class="fa-solid fa-magnifying-glass text-5xl mb-4 text-slate-300 dark:text-slate-600"></i>
      <p class="text-sm font-medium">No tasks match &ldquo;<strong class="text-slate-600 dark:text-slate-400">{{query}}</strong>&rdquo;</p>
    </div>
  </script>

  <script id="tpl-loading" type="text/x-handlebars-template">
    <div class="flex justify-center py-12">
      <div class="w-7 h-7 border-2 border-slate-200 dark:border-slate-700 border-t-primary-500 dark:border-t-primary-400 rounded-full animate-spin"></div>
    </div>
  </script>

  <script id="tpl-quick-add" type="text/x-handlebars-template">
    <div class="bg-white dark:bg-slate-800/80 rounded-2xl border border-slate-200/60 dark:border-slate-700/60 p-4 shadow-sm">
      <div class="flex items-center gap-2 mb-3 text-sm font-semibold text-slate-700 dark:text-slate-300">
        <i class="fa-solid fa-plus-circle text-primary-500"></i>
        Add Task
      </div>
      <form id="form-quick-add" class="flex gap-2">
        <input type="text" id="quick-title" placeholder="What needs to be done?" required autofocus
          class="flex-1 h-10 px-3.5 text-sm bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-primary-500/30 focus:border-primary-500 dark:focus:border-primary-400 focus:bg-white dark:focus:bg-slate-900 placeholder:text-slate-400 dark:placeholder:text-slate-500 transition-all duration-200" />
        <button type="submit" class="h-10 px-5 text-sm font-semibold text-white bg-primary-500 hover:bg-primary-600 active:bg-primary-700 rounded-xl transition-all duration-200 shadow-sm hover:shadow-md active:scale-[0.97]">Add</button>
      </form>
    </div>
  </script>

  <script id="tpl-task-item" type="text/x-handlebars-template">
    <div class="task-item flex items-center gap-3 px-4 py-3 rounded-xl bg-white dark:bg-slate-800/80 border border-slate-200/60 dark:border-slate-700/60 hover:border-slate-300 dark:hover:border-slate-600 hover:shadow-sm transition-all duration-200 group {{borderClass}}" data-id="{{id}}">
      <label class="flex-shrink-0 relative cursor-pointer">
        <input type="checkbox" class="task-toggle peer sr-only" {{#if done}}checked{{/if}}>
        <span class="block w-5 h-5 rounded-full border-2 border-slate-300 dark:border-slate-600 peer-checked:border-emerald-500 peer-checked:bg-emerald-500 peer-checked:shadow-sm peer-hover:border-primary-400 dark:peer-hover:border-primary-400 transition-all duration-200">
          <i class="fa-solid fa-check text-[10px] text-white absolute inset-0 flex items-center justify-center opacity-0 peer-checked:opacity-100 transition-opacity duration-200"></i>
        </span>
      </label>
      <div class="flex-1 min-w-0 cursor-pointer" data-navigate="{{id}}">
        <div class="task-title text-sm font-medium text-slate-800 dark:text-slate-200 {{#if done}}line-through text-slate-400 dark:text-slate-500{{/if}} truncate">{{title}}</div>
        <div class="flex items-center gap-2 mt-0.5">
          {{#if priorityLabel}}
            <span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-semibold uppercase tracking-wider {{#ifEq priorityClass "urgent"}}bg-red-100 dark:bg-red-900/50 text-red-700 dark:text-red-300{{/ifEq}}{{#ifEq priorityClass "high"}}bg-amber-100 dark:bg-amber-900/50 text-amber-700 dark:text-amber-300{{/ifEq}}">{{priorityLabel}}</span>
          {{/if}}
          {{#if category}}
            <span class="inline-flex items-center gap-1 text-[11px] text-slate-500 dark:text-slate-400"><i class="fa-solid fa-tag text-[10px]"></i>{{category}}</span>
          {{/if}}
          {{#if dueDate}}
            <span class="inline-flex items-center gap-1 text-[11px] {{#if dueOverdue}}text-red-500 dark:text-red-400{{else}}text-slate-400 dark:text-slate-500{{/if}}"><i class="fa-regular fa-calendar text-[10px]"></i>{{dueDate}}</span>
          {{/if}}
        </div>
      </div>
      <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity duration-200">
        <button class="task-view w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-primary-600 dark:hover:text-primary-400 hover:bg-primary-50 dark:hover:bg-primary-900/30 transition-all" title="View details"><i class="fa-solid fa-eye text-xs"></i></button>
        <button class="task-delete w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-red-600 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/30 transition-all" title="Delete"><i class="fa-solid fa-trash-can text-xs"></i></button>
      </div>
    </div>
  </script>

  <script id="tpl-task-list" type="text/x-handlebars-template">
    <div class="space-y-4">
      <div>
        <div class="flex items-center gap-2 mb-3 pb-2 border-b border-slate-200 dark:border-slate-700">
          <i class="fa-solid fa-clock text-primary-500 text-sm"></i>
          <h3 class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Pending</h3>
          <span class="ml-auto inline-flex items-center justify-center min-w-[20px] h-5 px-1.5 rounded-full text-[11px] font-semibold bg-primary-100 dark:bg-primary-900/50 text-primary-700 dark:text-primary-300">{{pendingCount}}</span>
        </div>
        <div id="pending-list" class="space-y-2"></div>
      </div>
      <div>
        <div class="flex items-center gap-2 mb-3 pb-2 border-b border-slate-200 dark:border-slate-700">
          <i class="fa-solid fa-check text-emerald-500 text-sm"></i>
          <h3 class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Completed</h3>
          <span class="ml-auto inline-flex items-center justify-center min-w-[20px] h-5 px-1.5 rounded-full text-[11px] font-semibold bg-emerald-100 dark:bg-emerald-900/50 text-emerald-700 dark:text-emerald-300">{{doneCount}}</span>
        </div>
        <div id="done-list" class="space-y-2"></div>
      </div>
    </div>
  </script>

  <script id="tpl-task-detail" type="text/x-handlebars-template">
    <div class="bg-white dark:bg-slate-800/80 rounded-2xl border border-slate-200/60 dark:border-slate-700/60 p-6 shadow-sm animate-scale-in">
      <div class="flex items-center gap-3 mb-6 pb-4 border-b border-slate-200 dark:border-slate-700">
        <i class="fa-solid fa-pen-to-square text-primary-500 text-lg"></i>
        <h3 class="text-lg font-bold text-slate-800 dark:text-white truncate">{{title}}</h3>
      </div>
      <form id="form-task-detail" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1.5">Title</label>
          <input type="text" name="title" value="{{title}}" required class="w-full h-10 px-3.5 text-sm bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-primary-500/30 focus:border-primary-500 dark:focus:border-primary-400 transition-all duration-200" />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1.5">Description</label>
          <textarea name="description" rows="4" class="w-full px-3.5 py-2.5 text-sm bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-primary-500/30 focus:border-primary-500 dark:focus:border-primary-400 transition-all duration-200 resize-none">{{description}}</textarea>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1.5">Category</label>
            <select name="category" class="w-full h-10 px-3 text-sm bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-primary-500/30 focus:border-primary-500 dark:focus:border-primary-400 transition-all duration-200">
              <option value="general" {{#ifEq category "general"}}selected{{/ifEq}}>General</option>
              <option value="work" {{#ifEq category "work"}}selected{{/ifEq}}>Work</option>
              <option value="personal" {{#ifEq category "personal"}}selected{{/ifEq}}>Personal</option>
              <option value="learning" {{#ifEq category "learning"}}selected{{/ifEq}}>Learning</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1.5">Priority</label>
            <select name="priority" class="w-full h-10 px-3 text-sm bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-primary-500/30 focus:border-primary-500 dark:focus:border-primary-400 transition-all duration-200">
              <option value="0" {{#ifEq priority 0}}selected{{/ifEq}}>Normal</option>
              <option value="1" {{#ifEq priority 1}}selected{{/ifEq}}>High</option>
              <option value="2" {{#ifEq priority 2}}selected{{/ifEq}}>Urgent</option>
            </select>
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1.5">Due Date</label>
          <input type="date" name="due_date" value="{{dueDate}}" class="w-full h-10 px-3.5 text-sm bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl outline-none focus:ring-2 focus:ring-primary-500/30 focus:border-primary-500 dark:focus:border-primary-400 transition-all duration-200" />
        </div>
        <label class="flex items-center gap-2.5 cursor-pointer">
          <input type="checkbox" name="status" value="done" {{#if done}}checked{{/if}} class="peer sr-only">
          <span class="w-5 h-5 rounded border-2 border-slate-300 dark:border-slate-600 peer-checked:border-emerald-500 peer-checked:bg-emerald-500 transition-all duration-200 flex items-center justify-center"><i class="fa-solid fa-check text-[10px] text-white peer-checked:opacity-100 opacity-0 transition-opacity"></i></span>
          <span class="text-sm text-slate-700 dark:text-slate-300">Mark as completed</span>
        </label>
        <div class="flex items-center gap-2 pt-4 border-t border-slate-200 dark:border-slate-700">
          <button type="submit" class="h-10 px-5 text-sm font-semibold text-white bg-emerald-500 hover:bg-emerald-600 active:bg-emerald-700 rounded-xl transition-all duration-200 shadow-sm hover:shadow-md active:scale-[0.97]"><i class="fa-solid fa-floppy-disk mr-1.5"></i>Save</button>
          <a href="#/" class="h-10 px-4 text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 rounded-xl transition-all duration-200 inline-flex items-center no-underline"><i class="fa-solid fa-arrow-left mr-1.5"></i>Back</a>
          <button class="task-delete ml-auto h-10 px-4 text-sm font-medium text-red-600 dark:text-red-400 hover:text-white bg-transparent hover:bg-red-500 dark:hover:bg-red-500 border border-red-300 dark:border-red-700 hover:border-red-500 rounded-xl transition-all duration-200 active:scale-[0.97]"><i class="fa-solid fa-trash-can mr-1.5"></i>Delete</button>
        </div>
      </form>
    </div>
  </script>

  <!-- Command Palette -->
  <div id="command-palette-overlay" class="fixed inset-0 z-[60] bg-black/40 backdrop-blur-sm hidden" style="animation: fadeIn 0.15s ease-out">
    <div class="absolute top-[15%] left-1/2 -translate-x-1/2 w-full max-w-lg px-4">
      <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-700 overflow-hidden">
        <div class="flex items-center gap-3 px-4 border-b border-slate-200 dark:border-slate-700">
          <i class="fa-solid fa-magnifying-glass text-slate-400 text-sm"></i>
          <input type="text" id="cmd-input" placeholder="Type a command..." class="flex-1 h-12 text-sm bg-transparent outline-none placeholder:text-slate-400 dark:placeholder:text-slate-500 text-slate-800 dark:text-slate-200" />
          <kbd class="text-[11px] px-1.5 py-0.5 rounded border border-slate-300 dark:border-slate-600 text-slate-400 dark:text-slate-500">esc</kbd>
        </div>
        <div id="cmd-results" class="p-2 max-h-72 overflow-y-auto">
          <div class="text-xs font-semibold uppercase tracking-wider text-slate-400 dark:text-slate-500 px-3 py-2">Commands</div>
          <button class="cmd-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700/50 transition-colors text-left" data-action="focus-search">
            <i class="fa-solid fa-search w-4 text-slate-400 text-xs"></i>
            <span>Search tasks</span>
            <kbd class="ml-auto text-[11px] px-1.5 py-0.5 rounded border border-slate-300 dark:border-slate-600 text-slate-400">/</kbd>
          </button>
          <button class="cmd-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700/50 transition-colors text-left" data-action="add-task">
            <i class="fa-solid fa-plus w-4 text-slate-400 text-xs"></i>
            <span>Add new task</span>
            <kbd class="ml-auto text-[11px] px-1.5 py-0.5 rounded border border-slate-300 dark:border-slate-600 text-slate-400">N</kbd>
          </button>
          <button class="cmd-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700/50 transition-colors text-left" data-action="toggle-theme">
            <i class="fa-solid fa-moon w-4 text-slate-400 text-xs"></i>
            <span>Toggle dark mode</span>
          </button>
          <button class="cmd-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700/50 transition-colors text-left" data-action="go-home">
            <i class="fa-solid fa-house w-4 text-slate-400 text-xs"></i>
            <span>Go to task list</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Confetti Canvas -->
  <canvas id="confetti-canvas" class="fixed inset-0 pointer-events-none z-[70]"></canvas>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/1.10.2/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/underscore.js/1.5.2/underscore-min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/backbone.js/1.0.0/backbone-min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/1.0.0/handlebars.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <script>var App={Models:{},Collections:{},Views:{},Router:{}};window.App=App;</script>
  <script>Handlebars.registerHelper('ifEq',function(a,b,opts){return a===b?opts.fn(this):opts.inverse(this)});</script>

  <script src="/static/js/app/models/task.js"></script>
  <script src="/static/js/app/animations.js"></script>
  <script src="/static/js/app/views/task-progress.js"></script>
  <script src="/static/js/app/views/task-item.js"></script>
  <script src="/static/js/app/views/notify.js"></script>
  <script src="/static/js/app/views/task-list.js"></script>
  <script src="/static/js/app/views/task-detail.js"></script>
  <script src="/static/js/app/router.js"></script>
  <script src="/static/js/app/main.js"></script>
</body>
</html>
